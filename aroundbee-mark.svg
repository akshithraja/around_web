<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="AroundBee">
  <title>AroundBee</title>

  <!-- Left antenna -->
  <path d="M 38 38 Q 34 22 30 14" fill="none" stroke="#c020e8" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Right antenna -->
  <path d="M 62 38 Q 66 22 70 14" fill="none" stroke="#c020e8" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Antenna tips -->
  <circle cx="30" cy="12" r="5" fill="#c020e8"/>
  <circle cx="70" cy="12" r="5" fill="#c020e8"/>

  <!-- Ring (bee head) -->
  <circle cx="50" cy="63" r="30" fill="none" stroke="#c020e8" stroke-width="10"/>
</svg>
